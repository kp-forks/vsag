name: Tsan Build & Test Parallel

on:
  push:
    branches: [ "main", "0.*" ]
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches: [ "main", "0.*" ]
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      non_markdown: ${{ steps.changes.outputs.non_markdown }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          # 'every' is REQUIRED here: with the default 'some' quantifier, the broad '**'
          # pattern would always match and the negation patterns ('!docs/**', '!**/*.md')
          # would have no effect, causing docs-only PRs to incorrectly trigger TSan.
          predicate-quantifier: 'every'
          filters: |
            non_markdown:
              - '**'
              - '!docs/**'
              - '!**/*.md'

  build_tsan:
    name: Build with TSAN
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.non_markdown == 'true'
    runs-on: ubuntu-22.04
    concurrency:
      group: test_tsan_x86-${{ github.event.pull_request.number || github.sha }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    container:
      image: vsaglib/vsag:ci-x86
      volumes:
        - /opt:/useless
    steps:
      - name: Free Disk Space
        run: rm -rf /useless/*
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
      - name: Load Cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: "5G"
          save: ${{ github.event_name != 'pull_request' }}
          key: build-tsan-${{ hashFiles('./CMakeLists.txt') }}-${{ hashFiles('./.circleci/fresh_ci_cache.commit') }}
      - name: Make Tsan
        run: export CMAKE_GENERATOR="Ninja"; make tsan
      - name: Clean
        run: find ./build -type f -name "*.o" -exec rm -f {} +
      - name: Save Test
        uses: actions/upload-artifact@v5
        with:
          path: ./build
          name: test_x86-${{ github.run_id }}-tsan
          compression-level: 1
          retention-days: 3
          overwrite: 'true'

  test_tsan:
    name: Run TSAN Tests
    needs: [changes, build_tsan]
    if: github.event_name != 'pull_request' || needs.changes.outputs.non_markdown == 'true'
    runs-on: ubuntu-22.04
    concurrency:
      group: test_tsan_x86-${{ github.event.pull_request.number || github.sha }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    container:
      image: vsaglib/vsag:ci-x86
    steps:
      - uses: actions/checkout@v4
      - name: Clean Env
        run: rm -rf ./build
      - name: Download Test
        uses: actions/download-artifact@v5
        with:
          name: test_x86-${{ github.run_id }}-tsan
          path: ./build/
      - name: Run TSAN tests
        run: |
          echo race:libomp.so > omp.supp
          echo race:libomp.so.5 >> omp.supp
          echo race:fmt::v10::detail::format_decimal >> omp.supp
          echo "race:libmkl_intel_thread.so.2" >> omp.supp
          export TSAN_OPTIONS=suppressions=omp.supp
          chmod +x ./build/tests/functests
          ./build/tests/functests "[concurrent]~[daily]"

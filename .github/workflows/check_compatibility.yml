name: Check Compatibility

on:
  push:
    branches: [ "main", "0.*" ]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

jobs:
  compatibility:
    name: Check Compatibility
    runs-on: ubuntu-latest
    concurrency:
      group: compatibility-${{ github.event.pull_request.number || github.sha }}
      cancel-in-progress: ${{ github.event_name == "pull_request" }}
    container:
      image: vsaglib/vsag:ci-x86-openblas
    steps:
      - name: Install GitHub CLI
        env:
          GH_VERSION: 2.75.0
        run: |
          if command -v gh >/dev/null 2>&1; then
            gh --version
            exit 0
          fi
          wget --tries=3 --timeout=30 -q "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" -O /tmp/gh.tar.gz
          tar xzf /tmp/gh.tar.gz -C /tmp
          install -m 0755 /tmp/gh_${GH_VERSION}_linux_amd64/bin/gh /usr/local/bin/gh
          rm -rf /tmp/gh.tar.gz /tmp/gh_${GH_VERSION}_linux_amd64
          gh --version
      - name: Download Compatibility Indexes from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download compatibility-indexes \
            --repo antgroup/vsag \
            --dir /tmp \
            --pattern "*.index" \
            --pattern "*.bin" \
            --pattern "*.json" \
            || echo "Warning: Failed to download compatibility indexes"
      - uses: actions/checkout@v4
      - name: Compile Check Compatibility Tools
        run: export CMAKE_GENERATOR="Ninja" EXTRA_DEFINED="-DUSE_SYSTEM_OPENBLAS=ON"; make release VSAG_ENABLE_TOOLS=ON
      - name: Run Check Compatibility
        run: bash ./scripts/check_compatibility.sh
